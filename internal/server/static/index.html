<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.RoomName}} — {{.DomainFull}}</title>
    <style>
        @font-face {
            font-family: 'Special Elite';
            src: url('/static/SpecialElite-Regular.woff2') format('woff2');
            font-display: swap;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: #000;
            font-family: sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .banner {
            background: #1a3a5c;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            flex-shrink: 0;
        }

        .banner a {
            font-family: 'Special Elite', serif;
            font-size: 2rem;
            text-decoration: none;
            line-height: 1;
        }

        .banner .domain-highlight {
            color: #f0f0f0;
        }

        .banner .domain-dim {
            color: #8a9bae;
        }

        .banner-controls {
            margin-left: auto;
        }

        .rec-btn {
            font-family: 'Special Elite', serif;
            font-size: 0.9rem;
            background: transparent;
            border: 1px solid #8a9bae;
            color: #8a9bae;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            cursor: pointer;
            display: none;
        }

        .rec-btn:hover {
            border-color: #f0f0f0;
            color: #f0f0f0;
        }

        .rec-btn.recording {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .rec-btn.recording:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        #jaas-container {
            flex: 1;
            min-height: 0;
        }
    </style>
    <script src='https://8x8.vc/{{.AppID}}/external_api.js' async></script>
    <script>
        window.onload = () => {
            const params = new URLSearchParams(location.search);
            const opts = {
                roomName: "{{.AppID}}/{{.RoomName}}",
                parentNode: document.querySelector('#jaas-container')
            };
            const jwt = params.get('jwt');
            if (jwt) {
                opts.jwt = jwt;
            }
            const api = new JitsiMeetExternalAPI("8x8.vc", opts);
            api.addEventListener('videoConferenceJoined', () => {
                api.executeCommand('setTileView', true);
            });

            if (jwt) {
                const recBtn = document.getElementById('rec-btn');
                let recording = false;
                recBtn.style.display = 'inline-block';

                recBtn.addEventListener('click', () => {
                    if (recording) {
                        api.executeCommand('stopRecording', { mode: 'file' });
                    } else {
                        api.executeCommand('startRecording', { mode: 'file' });
                    }
                });

                api.addEventListener('recordingStatusChanged', (e) => {
                    recording = e.on;
                    if (recording) {
                        recBtn.textContent = 'Stop Recording';
                        recBtn.classList.add('recording');
                    } else {
                        recBtn.textContent = 'Record';
                        recBtn.classList.remove('recording');
                    }
                });
            }
        };
    </script>
</head>
<body>
    <div class="banner">
        <a href="/">
            <span class="domain-highlight">{{.DomainFirst}}</span><span class="domain-dim">{{.DomainRest}}</span>
        </a>
        <div class="banner-controls">
            <button id="rec-btn" class="rec-btn">Record</button>
        </div>
    </div>
    <div id="jaas-container"></div>
</body>
</html>
